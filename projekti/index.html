<!doctype html>
<html lang="lv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projekti — Kalvis Lejasmeiers</title>
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- NAVIGATION -->
    <nav id="main-nav">
      <a href="../" class="nav-name">kalvis lejasmeiers</a>
      <ul class="nav-links">
        <li><a href="./" class="active">projekti</a></li>
        <li><a href="../#pieredze">pieredze</a></li>
        <li><a href="../par-mani/">par mani</a></li>
        <li><a href="../kontakti/">kontakti</a></li>
      </ul>
    </nav>

    <main class="projects-archive">
      <div class="archive-header">
        <span class="section-label">Visi projekti</span>

        <!-- Filter tabs -->
        <div class="filter-tabs">
          <button class="filter-btn active" data-filter="all">Visi</button>
          <button class="filter-btn" data-filter="Jaunbūve">Jaunbūve</button>
          <button class="filter-btn" data-filter="Renovācija">Renovācija</button>
          <button class="filter-btn" data-filter="Interjers">Interjers</button>
          <button class="filter-btn" data-filter="Lietojuma maiņa">Lietojuma maiņa</button>
        </div>
      </div>

      <!-- Project grid - rendered by JavaScript -->
      <div class="archive-grid" id="archive-grid"></div>
    </main>

    <footer>
      <div class="footer-contact">
        <a href="mailto:kalvis.lejasmeiers@gmail.com">kalvis.lejasmeiers@gmail.com</a>
        <a href="tel:+37129218775">+371 29218775</a>
        <span>Liepāja, Latvija</span>
      </div>
      <span class="footer-copy">© Kalvis Lejasmeiers</span>
    </footer>

    <script src="../assets/js/main.js"></script>
    <script>
      /* =========================================================================
         PROJECTS DATA
         =========================================================================
         
         HOW TO ADD A NEW PROJECT:
         -------------------------
         1. Copy one of the project objects below
         2. Fill in the fields:
            - folder: exact folder name inside /projekti/ (e.g., "Brivibas 97a")
            - title: display name in Latvian (e.g., "Brīvības 97a")
            - location: city in Latvian (e.g., "Rīga", "Jūrmala", "Liepāja")
            - type: one of: "Jaunbūve", "Renovācija", "Interjers", "Lietojuma maiņa"
            - year: four-digit year (e.g., 2024)
            - cover: filename of the cover image inside that folder
            - images: array of all image filenames to show in the gallery
         3. Make sure the folder exists and contains the images
         
         Example:
         {
           folder: "My New Project",
           title: "Mans Jaunais Projekts",
           location: "Rīga",
           type: "Jaunbūve",
           year: 2024,
           cover: "main-image.png",
           images: ["main-image.png", "interior-1.png", "exterior-2.png"],
         },
         
         ========================================================================= */
      
      const PROJECTS = [
        {
          folder: "Brivibas 97a",
          title: "Brīvības 97a",
          location: "Rīga",
          type: "Jaunbūve",
          year: 2023,
          cover: "1.png",
          images: ["1.png", "2.png"],
        },
        {
          folder: "Sarmites",
          title: "Sarmītes iela",
          location: "Jūrmala",
          type: "Jaunbūve",
          year: 2025,
          cover: "2025-12-02-11-28-55.png",
          images: ["2025-12-02-11-28-55.png"],
        },
        {
          folder: "Sabri Jurmalciems",
          title: "Sabri Jūrmalciems",
          location: "Jūrmala",
          type: "Jaunbūve",
          year: 2024,
          cover: "Enscape_2024-12-12-15-54-34.png",
          images: ["Enscape_2024-12-12-15-54-34.png"],
        },
      ];

      // Render the project grid
      function renderGrid(filter) {
        const grid = document.getElementById("archive-grid");
        const filteredProjects = filter === "all" 
          ? PROJECTS 
          : PROJECTS.filter(p => p.type === filter);
        
        grid.innerHTML = filteredProjects.map(project => `
          <article class="archive-card">
            <a href="./?project=${encodeURIComponent(project.folder)}" class="archive-card-link">
              <div class="archive-card-inner">
                <img 
                  src="${project.folder}/${project.cover}" 
                  alt="${project.title} — ${project.type}" 
                  loading="lazy"
                />
              </div>
              <div class="archive-card-info">
                <h3 class="archive-card-title">${project.title}</h3>
                <div class="archive-card-meta">
                  <span class="archive-card-type">${project.type}</span>
                  <span class="archive-card-location">${project.location}</span>
                  <span class="archive-card-year">${project.year}</span>
                </div>
              </div>
            </a>
          </article>
        `).join("");
      }

      // Render project detail view
      function openProject(folderName) {
        const project = PROJECTS.find(p => p.folder === folderName);
        if (!project) {
          renderGrid("all");
          return;
        }

        const container = document.querySelector(".projects-archive");
        const archiveHeader = document.querySelector(".archive-header");
        const archiveGrid = document.getElementById("archive-grid");

        // Hide the archive header and grid
        archiveHeader.style.display = "none";
        archiveGrid.style.display = "none";

        // Create and insert detail view
        const detailHTML = `
          <div class="project-detail">
            <a href="./" class="project-back">← Visi projekti</a>
            
            <div class="project-detail-header">
              <h1 class="project-detail-title">${project.title}</h1>
              <div class="project-detail-meta">
                <span>${project.type}</span>
                <span>${project.location}</span>
                <span>${project.year}</span>
              </div>
            </div>

            <div class="project-gallery">
              ${project.images.map((img, index) => `
                <div class="gallery-item${index === 0 ? " gallery-item--wide" : ""}">
                  <img 
                    src="${project.folder}/${img}" 
                    alt="${project.title} — ${index + 1}" 
                    loading="lazy"
                  />
                </div>
              `).join("")}
            </div>

            <div class="project-detail-cta">
              <p>Interesē līdzīgs projekts?</p>
              <a href="../kontakti/" class="cta-link">Sazināties →</a>
            </div>
          </div>
        `;

        // Insert detail view after the grid
        archiveGrid.insertAdjacentHTML("afterend", detailHTML);
      }

      // Initialize on page load
      document.addEventListener("DOMContentLoaded", () => {
        // Check for project parameter in URL
        const urlParams = new URLSearchParams(window.location.search);
        const projectParam = urlParams.get("project");

        if (projectParam) {
          openProject(decodeURIComponent(projectParam));
        } else {
          renderGrid("all");
        }

        // Wire up filter buttons
        const filterButtons = document.querySelectorAll(".filter-btn");
        filterButtons.forEach(button => {
          button.addEventListener("click", () => {
            // Update active button
            filterButtons.forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");

            // Filter projects
            const filter = button.dataset.filter;
            renderGrid(filter);
          });
        });
      });
    </script>
  </body>
</html>
