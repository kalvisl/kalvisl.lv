<!doctype html>
<html lang="lv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontakti — Kalvis Lejasmeiers | Projektētājs Liepāja</title>
    <meta
      name="description"
      content="Sazinieties ar projektētāju Liepājā. Tālrunis: +371 29218775. Konsultācija bez maksas — legalizācija, pārbūve, renovācija, jaunbūve."
    />
    <link rel="canonical" href="https://kalvisl.lv/kontakti/" />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- NAVIGATION -->
    <nav id="main-nav">
      <div class="nav-left">
        <a href="../" class="nav-name">kalvis lejasmeiers</a>
        <div class="nav-logo">
          <a href="../" aria-label="Uz sākumlapu">
            <img
              src="../kllogo/kl.png"
              alt="Kalvis Lejasmeiers Logo"
              decoding="async"
            />
          </a>
        </div>
      </div>
      <!-- Mobile hamburger button -->
      <button
        class="nav-hamburger"
        aria-label="Atvērt izvēlni"
        aria-expanded="false"
        aria-controls="main-menu"
      >
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>

      <ul class="nav-links" id="main-menu" role="menu">
        <li role="none"><a href="../projekti/" role="menuitem">projekti</a></li>
        <li role="none">
          <a href="../pakalpojumi/" role="menuitem">pakalpojumi</a>
        </li>
        <li role="none"><a href="../par-mani/" role="menuitem">par mani</a></li>
        <li role="none">
          <a href="./" role="menuitem" class="active">kontakti</a>
        </li>
      </ul>
    </nav>

    <main class="contact-page">
      <span class="section-label">Kontakti</span>

      <div class="about-page-content">
        <p>
          Ja vēlaties apspriest projektu iespējas vai saņemt papildus
          informāciju, lūdzu sazinieties ar mani.
        </p>

        <hr
          style="
            border: none;
            border-top: 1px solid var(--mist);
            margin: var(--space-xl) 0;
          "
        />

        <form action="https://formspree.io/f/xlgkvjgd" method="POST">
  <input type="hidden" name="_next" value="https://kalvisl.lv/success/">

  <div class="form-group">
    <label>Vārds, uzvārds *</label>
    <input type="text" name="vards" placeholder="Jūsu vārds un uzvārds" required>
  </div>

  <div class="form-group">
    <label>E-pasta adrese *</label>
    <input type="email" name="epasts" placeholder="jusu@epasts.lv" required>
  </div>

  <div class="form-group">
    <label>Telefona numurs</label>
    <input type="tel" name="telefons" placeholder="+371">
  </div>

  <div class="form-group">
    <label>Objekta adrese</label>
    <input type="text" name="adrese" placeholder="Piemēram, Liepāja, Rīgas iela 5">
  </div>

  <div class="form-group">
    <label>Pakalpojuma veids</label>
    <select name="pakalpojums">
      <option value="" disabled selected>Izvēlieties pakalpojumu</option>
      <option>Legalizācija</option>
      <option>Vienkāršotā pārbūve</option>
      <option>Pārbūve</option>
      <option>Renovācija / atjaunošana</option>
      <option>Jaunbūves projekts</option>
      <option>Lietošanas veida maiņa</option>
      <option>Konsultācija</option>
      <option>Cits</option>
    </select>
  </div>

  <div class="form-group">
    <label>Papildus informācija *</label>
    <textarea name="zinojums" placeholder="Pastāstiet īsi par projektu — kas jāizdara, kāds ir objekts, kādi termiņi..." rows="5" required></textarea>
  </div>

  <button type="submit" class="cta-button">Nosūtīt pieteikumu →</button>
</form>
      </div>
    </main>

    <footer>
      <div class="footer-contact">
        <a href="mailto:kalvis.lejasmeiers@gmail.com"
          >kalvis.lejasmeiers@gmail.com</a
        >
        <a href="tel:+37129218775">+371 29218775</a>
        <span>Liepāja, Latvija</span>
      </div>
      <div class="footer-bottom">
        <span class="footer-copy">© Kalvis Lejasmeiers</span>
        <a href="/privatuma-politika/" class="privacy-link"
          >Privātuma politika</a
        >
      </div>
    </footer>

    <script src="../assets/js/main.js" defer></script>
  </body>
</html>
